<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 172" role="img" aria-label="Web ingestion pipeline">
    <defs>
      <marker id="wi-ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b93a7"/></marker>
      <style>
        .wb{font:600 13px "Segoe UI",system-ui,sans-serif;fill:#e7ebf3}
        .ws{font:500 10.5px "Segoe UI",system-ui,sans-serif;fill:#aab3c5}
      </style>
    </defs>
    <g><rect x="8" y="52" width="120" height="64" rx="11" style="fill:rgba(91,141,239,.13);stroke:#5b8def;stroke-width:1.7"/>
      <text x="68" y="80" text-anchor="middle" class="wb">Any URL</text>
      <text x="68" y="98" text-anchor="middle" class="ws">a customer site</text></g>
    <path d="M128 84 L164 84" style="stroke:#8b93a7;stroke-width:1.6;fill:none" marker-end="url(#wi-ar)"/>
    <g><rect x="166" y="42" width="214" height="84" rx="11" style="fill:rgba(240,167,60,.12);stroke:#f0a73c;stroke-width:1.7"/>
      <text x="273" y="70" text-anchor="middle" class="wb">Crawl · politely</text>
      <text x="273" y="90" text-anchor="middle" class="ws">static + JS render (headless)</text>
      <text x="273" y="106" text-anchor="middle" class="ws">+ network capture · robots · rate-limit</text></g>
    <path d="M380 84 L416 84" style="stroke:#8b93a7;stroke-width:1.6;fill:none" marker-end="url(#wi-ar)"/>
    <g><rect x="418" y="48" width="192" height="72" rx="11" style="fill:rgba(25,184,154,.12);stroke:#19b89a;stroke-width:1.7"/>
      <text x="514" y="76" text-anchor="middle" class="wb">Any format</text>
      <text x="514" y="96" text-anchor="middle" class="ws">html · pdf · docx · json…</text>
      <text x="514" y="110" text-anchor="middle" class="ws">classified by content-type</text></g>
    <path d="M610 84 L646 84" style="stroke:#8b93a7;stroke-width:1.6;fill:none" marker-end="url(#wi-ar)"/>
    <g><rect x="648" y="52" width="140" height="64" rx="11" style="fill:rgba(169,116,240,.14);stroke:#a974f0;stroke-width:1.7"/>
      <text x="718" y="80" text-anchor="middle" class="wb">CG ingestion</text>
      <text x="718" y="98" text-anchor="middle" class="ws">extract (h,r,t,rc)</text></g>
    <path d="M788 84 L824 84" style="stroke:#8b93a7;stroke-width:1.6;fill:none" marker-end="url(#wi-ar)"/>
    <g><rect x="826" y="52" width="126" height="64" rx="11" style="fill:rgba(91,141,239,.13);stroke:#5b8def;stroke-width:1.7"/>
      <text x="889" y="78" text-anchor="middle" class="wb">Graph</text>
      <text x="889" y="98" text-anchor="middle" class="ws">+ URL provenance</text></g>
  </svg>
